<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DIY-Portfolio Hamburg</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

<header class="topbar">
  <div class="topbar__brand">DIY-Portfolio Hamburg</div>

  <button class="topbar__toggle" aria-label="Menü öffnen" aria-controls="site-menu" aria-expanded="false">
    <span></span><span></span><span></span>
  </button>

  <nav id="site-menu" class="topbar__nav" aria-hidden="true">
    <button class="topbar__close">×</button>
    <a href="#hero">Start</a>
    <a href="#projects">Hauptprojekte</a>
    <a href="#gallery">Weitere Projekte</a>
    <a href="#contact">Kontakt</a>
  </nav>
</header>

<main>

<!-- HERO -->
<section class="hero" id="hero">
  <div class="hero__image-wrapper">
    <img src="images/hero-outdoor-kueche.jpg" class="hero__image" />
    <div class="hero__overlay"></div>
  </div>
  <div class="hero__content">
    <h1>Aus Standard wird persönlich.</h1>
  </div>
</section>

<!-- HAUPTPROJEKTE -->
<section id="projects" class="section">
  <h2>Hauptprojekte</h2>

  <!-- HWR -->
  <div class="card before-after-card">
    <div class="before-after-fade">
      <img src="images/hwr-before.jpg" class="before-img">
      <img src="images/hwr-after.jpg" class="after-img">
    </div>
    <h3>Hauswirtschaftsraum</h3>
  </div>

  <!-- SCHLAFZIMMER -->
  <div class="card before-after-card">
    <div class="before-after-fade">
      <img src="images/bed-before.jpg" class="before-img">
      <img src="images/bed-after.jpg" class="after-img">
    </div>
    <h3>Schlafzimmer</h3>
  </div>

</section>

<!-- WEITERE PROJEKTE -->
<section id="gallery" class="section">
  <h2>Weitere Projekte</h2>

  <div class="grid">

    <!-- Sideboard -->
    <div class="card before-after-card">
      <div class="before-after-fade">
        <img src="images/sideboard-before.jpg" class="before-img">
        <img src="images/sideboard-after.jpg" class="after-img">
      </div>
      <h3>Sideboard</h3>
    </div>

    <!-- Lamellenwand -->
    <div class="card before-after-card">
      <div class="before-after-fade">
        <img src="images/schrank-before.jpg" class="before-img">
        <img src="images/schrank-after.jpg" class="after-img">
      </div>
      <h3>Lamellenwand</h3>
    </div>

    <!-- Terrasse -->
    <div class="card before-after-card">
      <div class="before-after-fade">
        <img src="images/terrasse-before.jpg" class="before-img">
        <img src="images/terrasse-after.jpg" class="after-img">
      </div>
      <h3>Terrasse</h3>
    </div>

    <!-- Neue Bilder korrekt -->
    <div class="card">
      <img src="images/wanddesign-final.jpg" loading="lazy">
      <h3>Wanddesign</h3>
    </div>

    <div class="card">
      <img src="images/kinderzimmer-final.jpg" loading="lazy">
      <h3>Kinderzimmer</h3>
    </div>

    <div class="card">
      <img src="images/outdoor-final.jpg" loading="lazy">
      <h3>Outdoor Küche</h3>
    </div>

  </div>
</section>

<!-- KONTAKT -->
<section id="contact" class="section">
  <h2>Kontakt</h2>
  <p>kontakt@diy-portfolio.hamburg</p>
</section>

</main>

<script src="script.js"></script>

</body>
</html>
