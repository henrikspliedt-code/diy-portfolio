<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Henrik – Projekte</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      color: #333;
    }

    h2 {
      text-align: center;
      margin-bottom: 40px;
    }

    /* ===== Fade Effekt ===== */
    .fade {
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.6s ease;
    }

    .fade.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ===== Projekte Grid ===== */
    .projects-more {
      padding: 60px 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .projects-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 24px;
    }

    .project-card {
      overflow: hidden;
      border-radius: 10px;
      background: #fff;
      transition: transform 0.3s ease;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
    }

    .project-card:hover {
      transform: translateY(-5px);
    }

    .project-card img {
      width: 100%;
      height: auto;
      display: block;
    }

    .project-card h3 {
      padding: 12px;
      font-size: 16px;
      font-weight: 500;
    }

  </style>
</head>

<body>

  <!-- ===== Weitere Projekte ===== -->
  <section class="projects-more">
    <h2>Weitere Projekte</h2>

    <div class="projects-grid">

      <div class="project-card fade">
        <img src="images/wanddesign-portfolio.jpg" alt="Wanddesign Wohnzimmer">
        <h3>Geometrisches Wanddesign</h3>
      </div>

      <div class="project-card fade">
        <img src="images/homeoffice-portfolio.jpg" alt="Homeoffice Lamellenwand">
        <h3>Homeoffice mit Lamellenwand</h3>
      </div>

      <div class="project-card fade">
        <img src="images/kinderzimmer-hochbett-portfolio.jpg" alt="Kinderzimmer Hochbett">
        <h3>Kinderzimmer Hochbettlösung</h3>
      </div>

      <div class="project-card fade">
        <img src="images/kinderbett-portfolio.jpg" alt="Kinderbett Spielbereich">
        <h3>Individuelles Kinderbett</h3>
      </div>

      <div class="project-card fade">
        <img src="images/gaestezimmer-tagbett-portfolio.jpg" alt="Gästezimmer Tagesbett">
        <h3>Gästezimmer mit Tagesbett</h3>
      </div>

      <div class="project-card fade">
        <img src="images/outdoor-kueche-portfolio.jpg" alt="Outdoor Küche">
        <h3>Outdoor Küche</h3>
      </div>

      <div class="project-card fade">
        <img src="images/terrasse-lounge-portfolio.jpg" alt="Terrasse Lounge">
        <h3>Terrassen Lounge</h3>
      </div>

      <div class="project-card fade">
        <img src="images/sandkasten-portfolio.jpg" alt="Sandkasten Bereich">
        <h3>Sandkasten & Gartenbereich</h3>
      </div>

    </div>
  </section>

  <!-- ===== Fade Script ===== -->
  <script>
    const faders = document.querySelectorAll('.fade');

    const appearOptions = {
      threshold: 0.2
    };

    const appearOnScroll = new IntersectionObserver(function(entries, observer) {
      entries.forEach(entry => {
        if (!entry.isIntersecting) return;
        entry.target.classList.add('visible');
        observer.unobserve(entry.target);
      });
    }, appearOptions);

    faders.forEach(fader => {
      appearOnScroll.observe(fader);
    });
  </script>

</body>
</html>
